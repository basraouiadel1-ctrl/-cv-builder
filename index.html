<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>CV Builder</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(to right, #e0f7fa, #e8f5e9);
      display: flex;
      justify-content: center;
      padding: 50px 20px;
    }

    #builder {
      width: 500px;
    }

    input, textarea {
      display: block;
      width: 100%;
      margin: 10px 0;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 15px;
    }

    button {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(90deg, #43a047, #66bb6a);
      color: white;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 10px;
    }

    button:hover {
      opacity: 0.9;
      transform: scale(1.02);
    }

    #cv {
      background: white;
      padding: 25px;
      margin-top: 25px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      border-radius: 12px;
    }

    h2 {
      color: #2e7d32;
      margin-bottom: 5px;
      border-bottom: 2px solid #43a047;
      padding-bottom: 5px;
    }

    h3 {
      color: #43a047;
      margin-top: 15px;
      margin-bottom: 5px;
      border-bottom: 1px solid #a5d6a7;
      padding-bottom: 3px;
    }

    p {
      margin: 6px 0;
      line-height: 1.5;
    }

    .section {
      margin-top: 15px;
      padding: 10px;
      background: #f1f8e9;
      border-radius: 8px;
    }
  </style>

  <!-- jsPDF library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
  <div id="builder">
    <h1 style="text-align:center; color:#2e7d32;">CV Builder</h1>

    <input type="text" id="name" placeholder="Your Name">
    <input type="email" id="email" placeholder="Your Email">
    <input type="text" id="phone" placeholder="Your Phone">
    <textarea id="experience" placeholder="Your Experience"></textarea>
    <textarea id="skills" placeholder="Your Skills"></textarea>

    <button onclick="generatePDF()">Generate & Download PDF</button>

    <div id="cv"></div>
  </div>

  <script>
    function generatePDF() {
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const phone = document.getElementById('phone').value;
      const experience = document.getElementById('experience').value;
      const skills = document.getElementById('skills').value;

      // عرض CV فالموقع
      document.getElementById('cv').innerHTML = `
        <h2>${name}</h2>
        <p><b>Email:</b> ${email}</p>
        <p><b>Phone:</b> ${phone}</p>
        <div class="section">
          <h3>Experience</h3>
          <p>${experience}</p>
        </div>
        <div class="section">
          <h3>Skills</h3>
          <p>${skills}</p>
        </div>
      `;

      // إنشاء PDF
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      doc.setFontSize(12);
      doc.text(`Name: ${name}`, 10, 10);
      doc.text(`Email: ${email}`, 10, 20);
      doc.text(`Phone: ${phone}`, 10, 30);
      doc.text(`Experience:\n${experience}`, 10, 40);
      doc.text(`Skills:\n${skills}`, 10, 80);
      doc.save(`${name}_CV.pdf`);
    }
  </script>
</body>
</html>
