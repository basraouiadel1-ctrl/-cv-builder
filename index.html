<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Professional CV Builder</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #e8f5e9;
      display: flex;
      justify-content: center;
      padding: 50px 20px;
    }

    #builder {
      width: 600px;
      background: #ffffff;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 12px 25px rgba(0,0,0,0.15);
    }

    input, textarea {
      display: block;
      width: 100%;
      margin: 12px 0;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(90deg, #43a047, #66bb6a);
      color: white;
      cursor: pointer;
      margin-top: 12px;
    }

    button:hover {
      transform: scale(1.03);
      opacity: 0.9;
    }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
  <div id="builder">
    <h1 style="text-align:center; color:#2e7d32;">Professional CV Builder</h1>

    <input type="text" id="name" placeholder="Your Name">
    <input type="email" id="email" placeholder="Your Email">
    <input type="text" id="phone" placeholder="Your Phone">
    <textarea id="experience" placeholder="Your Experience"></textarea>
    <textarea id="skills" placeholder="Your Skills"></textarea>

    <button onclick="generatePDF()">Generate & Download PDF</button>
  </div>

  <script>
    function generatePDF() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();

      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const phone = document.getElementById('phone').value;
      const experience = document.getElementById('experience').value;
      const skills = document.getElementById('skills').value;

      let y = 20;

      // Header
      doc.setFontSize(24);
      doc.setTextColor(46,125,50);
      doc.text(name, 105, y, {align: "center"});
      y += 10;
      doc.setFontSize(12);
      doc.setTextColor(0,0,0);
      doc.text(`${email} | ${phone}`, 105, y, {align: "center"});
      y += 15;

      // Divider
      doc.setDrawColor(67,160,71);
      doc.setLineWidth(0.8);
      doc.line(10, y, 200, y);
      y += 10;

      // Experience
      doc.setFontSize(16);
      doc.setTextColor(43,139,56);
      doc.text("Experience", 14, y);
      y += 8;
      doc.setFontSize(12);
      doc.setTextColor(0,0,0);
      doc.text(experience, 14, y, { maxWidth: 180 });
      y += 30;

      // Skills
      doc.setFontSize(16);
      doc.setTextColor(43,139,56);
      doc.text("Skills", 14, y);
      y += 8;
      doc.setFontSize(12);
      doc.setTextColor(0,0,0);
      doc.text(skills, 14, y, { maxWidth: 180 });
      y += 30;

      doc.save(`${name}_CV.pdf`);
    }
  </script>
</body>
</html>
